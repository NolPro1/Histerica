<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges">
  <!-- Pharaoh Gold Frame - pixel art -->
  <rect x="0" y="0" width="80" height="4" fill="#DAA520"/>
  <rect x="0" y="76" width="80" height="4" fill="#DAA520"/>
  <rect x="0" y="0" width="4" height="80" fill="#DAA520"/>
  <rect x="76" y="0" width="4" height="80" fill="#DAA520"/>
  <!-- inner border -->
  <rect x="4" y="4" width="72" height="2" fill="#B8860B"/>
  <rect x="4" y="74" width="72" height="2" fill="#B8860B"/>
  <rect x="4" y="4" width="2" height="72" fill="#B8860B"/>
  <rect x="74" y="4" width="2" height="72" fill="#B8860B"/>
  <!-- corner hieroglyphs -->
  <rect x="8" y="8" width="4" height="4" fill="#FFD700"/>
  <rect x="12" y="8" width="2" height="2" fill="#FFD700"/>
  <rect x="8" y="12" width="2" height="2" fill="#FFD700"/>
  <rect x="68" y="8" width="4" height="4" fill="#FFD700"/>
  <rect x="66" y="8" width="2" height="2" fill="#FFD700"/>
  <rect x="72" y="12" width="2" height="2" fill="#FFD700"/>
  <rect x="8" y="68" width="4" height="4" fill="#FFD700"/>
  <rect x="12" y="72" width="2" height="2" fill="#FFD700"/>
  <rect x="8" y="66" width="2" height="2" fill="#FFD700"/>
  <rect x="68" y="68" width="4" height="4" fill="#FFD700"/>
  <rect x="66" y="72" width="2" height="2" fill="#FFD700"/>
  <rect x="72" y="66" width="2" height="2" fill="#FFD700"/>
  <!-- top/bottom ankh symbols -->
  <rect x="36" y="0" width="2" height="4" fill="#FFD700"/>
  <rect x="42" y="0" width="2" height="4" fill="#FFD700"/>
  <rect x="36" y="76" width="2" height="4" fill="#FFD700"/>
  <rect x="42" y="76" width="2" height="4" fill="#FFD700"/>
</svg>
